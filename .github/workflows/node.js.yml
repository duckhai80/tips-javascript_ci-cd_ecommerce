name: Node.js CI/CD Ecommerce

on:
  push:
    branches: ["master"]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          # KHÔNG dùng tham số cache: 'npm' ở đây để tránh làm nghẽn ổ đĩa EC2

      - name: Install dependencies
        run: |
          # --no-audit và --no-fund giúp giảm tải việc quét bảo mật liên tục, tiết kiệm đĩa/CPU
          npm install --include=dev --no-audit --no-fund

      - name: Check nodemon version (Optional)
        run: npx nodemon --version || echo "Nodemon is ready"

      - name: Restart server
        run: pm2 restart ecommerce-backend
